name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hexagonal_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hexagonal_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: hexagonal_test_db
      DB_SYNC: "false"
      DB_DROP_SCHEMA: "false"
      DB_MIGRATIONS_RUN: "false"
      DB_LOGGING: "false"
      JWT_SECRET: ci-jwt-secret-minimum-32-characters
      JWT_EXPIRES_IN: 15m
      AUTH_REFRESH_TOKEN_TTL_MS: 2592000000
      AUTH_EXPOSE_PRIVATE_TOKENS: "false"
      AUTH_RATE_LIMIT_ENABLED: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run test:ci

      - name: Publish coverage summary
        if: always()
        run: |
          node <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const path = 'coverage/coverage-summary.json';
          if (!fs.existsSync(path)) {
            console.log('## Coverage');
            console.log('');
            console.log('Coverage summary was not generated.');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync(path, 'utf8')).total;
          const rows = [
            ['Statements', summary.statements],
            ['Branches', summary.branches],
            ['Functions', summary.functions],
            ['Lines', summary.lines],
          ];
          console.log('## Coverage');
          console.log('');
          console.log('| Metric | Percent | Covered / Total |');
          console.log('| --- | ---: | ---: |');
          for (const [label, metric] of rows) {
            console.log(`| ${label} | ${metric.pct}% | ${metric.covered} / ${metric.total} |`);
          }
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
